# Codesteward MCP — Release
#
# Triggered by version tags (e.g. v0.1.0).  Pipeline:
#   1. test          — run the full test suite (gate)
#   2. build         — uv build both PyPI packages (artifacts)
#   3. publish-pypi  — publish codesteward-graph, wait, publish codesteward-mcp
#   4. build-docker  — build & push multi-arch image to ghcr.io (runs in parallel with publish-pypi)
#   5. release       — create GitHub release, attach dist archives + Docker image reference
#
# PyPI publishing uses OIDC Trusted Publishing — no API token secret needed.
# Configure a Trusted Publisher on PyPI for each package:
#   PyPI → your project → Publishing → Add a new publisher
#   Publisher: GitHub Actions
#   Owner: bitkaio  |  Repository: codesteward-mcp  |  Workflow: release.yml  |  Environment: pypi
#
# The Docker image is published to ghcr.io using GITHUB_TOKEN (no extra secret).
# Make sure the repository's "Packages" permissions allow write access:
#   Settings → Actions → General → Workflow permissions → Read and write

name: Release

on:
  push:
    tags: ["v*.*.*"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # bitkaio/codesteward-mcp

jobs:

  # ── Gate: tests must pass before we publish anything ─────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-packages --extra graph --frozen

      - name: Run tests
        run: uv run pytest tests/ -v

  # ── Build PyPI packages ───────────────────────────────────────────────────────
  build-packages:
    name: Build packages
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Build codesteward-graph
        run: uv build packages/codesteward-graph --out-dir packages/codesteward-graph/dist

      - name: Build codesteward-mcp
        run: uv build packages/codesteward-mcp --out-dir packages/codesteward-mcp/dist

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: packages/*/dist/
          if-no-files-found: error

  # ── Publish to PyPI ───────────────────────────────────────────────────────────
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build-packages
    environment: pypi
    permissions:
      id-token: write   # required for OIDC Trusted Publisher authentication

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      # Publish codesteward-graph first — codesteward-mcp depends on it.
      - name: Publish codesteward-graph
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/codesteward-graph/dist/

      # Give PyPI time to index codesteward-graph before the dependent package
      # upload triggers a dependency check.
      - name: Wait for PyPI to index codesteward-graph
        run: sleep 15

      - name: Publish codesteward-mcp
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/codesteward-mcp/dist/

  # ── Build & push Docker image to ghcr.io ─────────────────────────────────────
  build-docker:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generate image tags from the git tag:
      #   ghcr.io/bitkaio/codesteward-mcp:0.1.0
      #   ghcr.io/bitkaio/codesteward-mcp:0.1
      #   ghcr.io/bitkaio/codesteward-mcp:0
      #   ghcr.io/bitkaio/codesteward-mcp:latest
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push (graph-all — all 14 languages)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.mcp
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: INSTALL_EXTRA=graph-all
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Create GitHub release ─────────────────────────────────────────────────────
  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: [publish-pypi, build-docker]
    permissions:
      contents: write

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/codesteward-graph/dist/*.whl
            dist/codesteward-graph/dist/*.tar.gz
            dist/codesteward-mcp/dist/*.whl
            dist/codesteward-mcp/dist/*.tar.gz
          body: |
            ## Docker image

            ```bash
            docker pull ghcr.io/bitkaio/codesteward-mcp:${{ github.ref_name }}
            ```

            Full setup guide: [AGENT_SETUP.md](https://github.com/bitkaio/codesteward-mcp/blob/main/AGENT_SETUP.md)
